<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>炸飞机游戏 Ver.3</title>
<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f7fb;
    text-align:center;
}

h2{
    margin-top:30px;
}

#msg{
    margin-top:10px;
    font-size:18px;
    color:#333;
}

#board{
    width:max-content;
    margin:20px auto;
    display:grid;
    grid-template-columns:repeat(10, 40px);
    gap:4px;
}

.cell{
    width:40px;
    height:40px;
    background:#87ceeb;
    border:1px solid #333;
    cursor:pointer;
}

.hit{
    background:#ff6b6b;
}

.miss{
    background:#dcdcdc;
}
</style>
</head>
<body>

<h2>炸飞机游戏 Ver.3</h2>
<p id="msg">请点击一个格子，找出隐藏的目标</p>
<div id="board"></div>

<script>
const board = document.getElementById("board");
const msg = document.getElementById("msg");

// 随机生成一个目标坐标
const targetX = Math.floor(Math.random() * 10);
const targetY = Math.floor(Math.random() * 10);

for(let x = 0; x < 10; x++){
    for(let y = 0; y < 10; y++){
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.dataset.x = x;
        cell.dataset.y = y;

        cell.onclick = function(){
            const cellX = Number(this.dataset.x);
            const cellY = Number(this.dataset.y);

            // 已经点过的格子不重复处理
            if(this.classList.contains("hit") || this.classList.contains("miss")){
                return;
            }

            if(cellX === targetX && cellY === targetY){
                this.classList.add("hit");
                msg.innerText = `恭喜你找到了目标！坐标是 (${cellX}, ${cellY})`;
            }else{
                this.classList.add("miss");
                msg.innerText = `这里没有目标：(${cellX}, ${cellY})`;
            }
        };

        board.appendChild(cell);
    }
}
</script>

</body>
</html>
